<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Misskey Word & Emoji Fall</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            color: #fff;
            font-family: sans-serif;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        input {
            padding: 5px;
            font-size: 16px;
        }

        button {
            padding: 5px 10px;
            font-size: 16px;
            cursor: pointer;
        }

        canvas {
            display: block;
        }

        #status {
            margin-top: 10px;
            font-size: 14px;
            color: #0f0;
        }
    </style>
</head>

<body>

    <div id="ui">
        <label for="host">Misskeyサーバー:</label><br>
        <input type="text" id="host" value="" placeholder="例: sushi.ski"><br><br>
        <button id="start-btn" disabled>辞書データを読み込み中...</button>
        <div id="status"></div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        // --- 1. Web Worker のコードを文字列として定義（フリーズ対策） ---
        // これにより別スレッドでKuromojiが動くため、画面が絶対に固まらなくなる
        const workerCode = `
      importScripts("https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/build/kuromoji.js");

      let tokenizer = null;

      kuromoji.builder({ dicPath: "https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/dict/" }).build((err, _tokenizer) => {
        if (err) {
          self.postMessage({ type: "ERROR", error: err.toString() });
          return;
        }
        tokenizer = _tokenizer;
        self.postMessage({ type: "READY" });
      });

      self.onmessage = function(e) {
        if (e.data.type === "PARSE") {
          if (!tokenizer) return;
          const tokens = tokenizer.tokenize(e.data.text);
          const words = [];
          for (const token of tokens) {
            if (token.pos === "助詞" || token.pos === "助動詞" || token.pos === "記号") continue;
            if (token.surface_form.trim() === "") continue;
            words.push(token.surface_form);
          }
          self.postMessage({ type: "PARSE_RESULT", words: words });
        }
      };
    `;

        // Workerの起動
        const blob = new Blob([workerCode], { type: "application/javascript" });
        const worker = new Worker(URL.createObjectURL(blob));

        // --- 2. メインのフロントエンド処理 ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const statusDiv = document.getElementById('status');
        const hostInput = document.getElementById('host');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let wordsPool = [];
        let fallingWords = [];
        let isAnimating = false;
        const imageCache = {};

        // Workerからのメッセージ受信
        let parseResolve = null;
        worker.onmessage = function (e) {
            if (e.data.type === "READY") {
                startBtn.disabled = false;
                startBtn.textContent = "取得開始";
                statusDiv.textContent = "準備完了";
            } else if (e.data.type === "PARSE_RESULT") {
                if (parseResolve) {
                    parseResolve(e.data.words);
                    parseResolve = null;
                }
            } else if (e.data.type === "ERROR") {
                statusDiv.textContent = "辞書読み込みエラー: " + e.data.error;
            }
        };

        // Workerに形態素解析を依頼する関数
        function parseTextAsync(text) {
            return new Promise((resolve) => {
                parseResolve = resolve;
                worker.postMessage({ type: "PARSE", text: text });
            });
        }

        function cleanText(text) {
            if (!text) return "";
            text = text.replace(/https?:\/\/[\w!?\/\+\-_~;.,*&@#$%()'[\]]+/g, "");
            text = text.replace(/@[a-zA-Z0-9_.-]+/g, "");
            text = text.replace(/\$\[[\s\S]*?\]/g, "");
            return text;
        }

        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        // 単一の絵文字情報をサーバーから取得するAPI (api/emoji)
        async function fetchSingleEmojiUrl(host, name) {
            try {
                const res = await fetch(`https://${host}/api/emoji`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name: name })
                });
                if (!res.ok) return null;
                const data = await res.json();
                return data.url || null;
            } catch (e) {
                return null;
            }
        }

        // Misskeyから投稿を取得
        async function fetchNotes(host) {
            let notes = [];
            let untilId = null;
            const targetCount = 1000;
            const limitPerRequest = 100;
            const requests = targetCount / limitPerRequest;

            for (let i = 0; i < requests; i++) {
                statusDiv.textContent = `投稿を取得中... (${i + 1}/${requests}回目)`;
                const body = { limit: limitPerRequest };
                if (untilId) body.untilId = untilId;

                try {
                    const res = await fetch(`https://${host}/api/notes/local-timeline`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(body)
                    });

                    if (!res.ok) throw new Error("APIエラー");
                    const data = await res.json();
                    if (data.length === 0) break;

                    notes = notes.concat(data);
                    untilId = data[data.length - 1].id;
                    await sleep(100);
                } catch (e) {
                    console.error(e);
                    statusDiv.textContent = "取得中にエラーが発生";
                    break;
                }
            }
            return notes;
        }

        startBtn.addEventListener('click', async () => {
            const host = hostInput.value.trim();
            if (!host) return;

            startBtn.disabled = true;
            wordsPool = [];
            fallingWords = [];

            const notes = await fetchNotes(host);
            statusDiv.textContent = "テキストと絵文字を解析中...";

            // すべてのノートを順番に処理
            for (const note of notes) {
                const targetNote = note.renote ? note.renote : note;
                let text = targetNote.text;
                if (!text) continue;

                text = cleanText(text);

                const emojiRegex = /:([a-zA-Z0-9_+-]+):/g;
                let lastIndex = 0;
                let match;

                while ((match = emojiRegex.exec(text)) !== null) {
                    const emojiName = match[1];
                    const beforeText = text.substring(lastIndex, match.index);

                    // 前のテキストをWorkerで非同期に解析
                    if (beforeText.trim()) {
                        const words = await parseTextAsync(beforeText);
                        wordsPool.push(...words.map(w => ({ type: 'text', value: w })));
                    }

                    // ★絵文字単体取得APIを叩く処理
                    if (imageCache[emojiName] === undefined) {
                        // キャッシュにない場合はAPIに問い合わせ
                        const realUrl = await fetchSingleEmojiUrl(host, emojiName);
                        if (realUrl) {
                            const img = new Image();
                            img.crossOrigin = "anonymous";
                            img.src = realUrl;
                            imageCache[emojiName] = img;
                        } else {
                            // 存在しない絵文字（ただのコロン文字列など）はnullを入れて次からスキップ
                            imageCache[emojiName] = null;
                        }
                    }

                    if (imageCache[emojiName]) {
                        wordsPool.push({ type: 'emoji', value: imageCache[emojiName] });
                    } else {
                        wordsPool.push({ type: 'text', value: match[0] });
                    }

                    lastIndex = emojiRegex.lastIndex;
                }

                const afterText = text.substring(lastIndex);
                if (afterText.trim()) {
                    const words = await parseTextAsync(afterText);
                    wordsPool.push(...words.map(w => ({ type: 'text', value: w })));
                }
            }

            statusDiv.textContent = `準備完了！ (総要素数: ${wordsPool.length})`;
            startBtn.disabled = false;
            startBtn.textContent = "再取得";

            if (!isAnimating && wordsPool.length > 0) {
                isAnimating = true;
                animate();
            }
        });

        function spawnWord() {
            if (wordsPool.length === 0) return;
            const item = wordsPool[Math.floor(Math.random() * wordsPool.length)];

            fallingWords.push({
                type: item.type,
                value: item.value,
                x: Math.random() * canvas.width,
                y: -50,
                speed: 1 + Math.random() * 3,
                fontSize: 14 + Math.random() * 20,
                color: `hsl(${120 + Math.random() * 60}, 100%, 50%)`
            });
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < fallingWords.length; i++) {
                const fw = fallingWords[i];

                if (fw.type === 'text') {
                    ctx.fillStyle = fw.color;
                    ctx.font = `${fw.fontSize}px sans-serif`;
                    ctx.fillText(fw.value, fw.x, fw.y);
                } else if (fw.type === 'emoji') {
                    const size = fw.fontSize * 1.5;
                    if (fw.value && fw.value.complete && fw.value.naturalWidth > 0) {
                        ctx.drawImage(fw.value, fw.x, fw.y - size + 5, size, size);
                    }
                }

                fw.y += fw.speed;
            }

            fallingWords = fallingWords.filter(fw => fw.y < canvas.height + 50);

            if (Math.random() < 0.2) {
                spawnWord();
            }

            requestAnimationFrame(animate);
        }
    </script>
</body>

</html>
